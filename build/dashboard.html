<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Architecture Master</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
/* ── Dashboard Layout ── */
body {
  display: flex; height: 100vh; overflow: hidden;
  background: var(--color-bg);
  color: var(--color-text);
  margin: 0;
}

.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--color-bg2);
  border-right: 1px solid var(--color-border);
  display: flex; flex-direction: column;
  padding: 24px 16px;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--color-text);
  font-family: var(--font-heading); font-size: 18px; font-weight: 700;
  padding: 8px 12px; margin-bottom: 24px;
}
.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.sidebar-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  color: var(--color-muted); text-decoration: none;
  font-size: 14px; font-weight: 500;
  transition: all 0.15s; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
}
.sidebar-link:hover { background: var(--color-surface2); color: var(--color-text); }
.sidebar-link.active { background: rgba(108,99,255,0.15); color: var(--color-accent); }
.sidebar-link .icon { width: 20px; text-align: center; font-size: 16px; }

.sidebar-user {
  border-top: 1px solid var(--color-border);
  padding-top: 16px; margin-top: 16px;
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--color-accent), #818CF8);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: white;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; truncate: clip; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11px; color: var(--color-muted); }
.logout-btn {
  background: none; border: none; color: var(--color-muted);
  cursor: pointer; font-size: 18px; padding: 4px;
  transition: color 0.15s;
}
.logout-btn:hover { color: var(--color-danger); }

/* ── Main ── */
.main {
  flex: 1; overflow-y: auto; padding: 32px 40px;
}
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px;
}
.greeting h1 {
  font-family: var(--font-heading); font-size: 26px; font-weight: 700;
  margin: 0 0 4px;
}
.greeting p { font-size: 14px; color: var(--color-muted); margin: 0; }

.top-actions { display: flex; align-items: center; gap: 12px; }
.search-input {
  padding: 9px 16px 9px 36px; border-radius: var(--radius-sm);
  background: var(--color-surface2); border: 1px solid var(--color-border);
  color: var(--color-text); font-size: 14px; width: 220px;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--color-accent); }
.search-wrap { position: relative; }
.search-wrap::before {
  content: '🔍'; position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); font-size: 13px;
}

/* ── Designs Grid ── */
.section-title {
  font-family: var(--font-heading); font-size: 16px; font-weight: 600;
  margin: 0 0 16px; color: var(--color-muted);
  text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px;
}
.designs-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px; margin-bottom: 40px;
}
.design-card {
  background: var(--color-surface2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer;
  transition: all 0.2s var(--ease);
}

.design-card:hover {
  border-color: rgba(108,99,255,0.4);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(108,99,255,0.08);
}
.card-thumb {
  height: 160px; background: linear-gradient(135deg, #0D0D1F, #12122A);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; position: relative;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-menu-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.5); border: none; border-radius: 8px;
  color: white; width: 28px; height: 28px;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
}
.design-card:hover .card-menu-btn { display: flex; }
.card-body { padding: 16px; }
.card-name {
  font-family: var(--font-heading); font-size: 15px; font-weight: 600;
  margin: 0 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-meta { font-size: 12px; color: var(--color-muted); display: flex; gap: 10px; }
.card-floor-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(108,99,255,0.15); color: var(--color-accent);
  border-radius: var(--radius-full); padding: 2px 8px; font-size: 11px; font-weight: 600;
}

/* Context menu */
.ctx-menu {
  position: fixed; background: #1C1C2E;
  border: 1px solid var(--color-border2); border-radius: var(--radius-md);
  padding: 6px; z-index: var(--z-modal); display: none; min-width: 160px;
  box-shadow: var(--shadow-lg);
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.15s;
}
.ctx-item:hover { background: var(--color-surface2); }
.ctx-item.danger { color: var(--color-danger); }
.ctx-item.danger:hover { background: rgba(255,90,95,0.1); }

/* Skeleton */
.skeleton-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
.skeleton-thumb { height: 160px; }
.skeleton-body { padding: 16px; }
.skeleton-line { height: 14px; border-radius: 4px; margin-bottom: 10px; }
.skeleton-line.short { width: 60%; }

/* Empty state */
.empty-state {
  grid-column: 1/-1; text-align: center; padding: 60px 20px;
}
.empty-icon { font-size: 56px; margin-bottom: 20px; }
.empty-state h3 { font-family: var(--font-heading); font-size: 20px; margin: 0 0 10px; }
.empty-state p { color: var(--color-muted); font-size: 14px; margin: 0 0 24px; }

/* New design btn */
.btn-new {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; background: var(--color-accent); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: var(--font-ui);
  transition: all 0.2s; text-decoration: none;
}
.btn-new:hover { background: var(--color-accent-h); transform: translateY(-1px); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 20px; }
}
</style>
</head>
<body>
<div id="a3d-toasts"></div>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <a href="landing.html" class="sidebar-logo">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <rect x="2" y="2" width="11" height="11" rx="2" fill="#6C63FF" opacity="0.9"/>
      <rect x="15" y="2" width="11" height="11" rx="2" fill="#6C63FF" opacity="0.5"/>
      <rect x="2" y="15" width="11" height="11" rx="2" fill="#6C63FF" opacity="0.5"/>
      <rect x="15" y="15" width="11" height="11" rx="2" fill="#00C9A7" opacity="0.9"/>
    </svg>
    Architecture Master
  </a>
  <nav class="sidebar-nav">
    <a class="sidebar-link active" href="dashboard.html">
      <span class="icon">📐</span> My Designs
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar" id="sidebarAvatar">?</div>
    <div class="user-info">
      <div class="user-name" id="sidebarName">Loading...</div>
      <div class="user-email" id="sidebarEmail"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()" title="Logout">⏻</button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <div class="top-bar">
    <div class="greeting">
      <h1 id="greetingText">Good morning 👋</h1>
      <p>Here are all your saved floor plans</p>
    </div>
    <div class="top-actions">
      <div class="search-wrap">
        <input class="search-input" type="text" id="searchInput" placeholder="Search designs..." oninput="filterDesigns(this.value)">
      </div>
      <button class="btn-new" onclick="newDesign()">＋ New Design</button>
    </div>
  </div>

  <div class="section-title">Your Designs</div>
  <div class="designs-grid" id="designsGrid">
    <!-- Skeleton loading -->
    <div class="skeleton-card"><div class="skeleton-thumb skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton"></div><div class="skeleton-line short skeleton"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-thumb skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton"></div><div class="skeleton-line short skeleton"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-thumb skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton"></div><div class="skeleton-line short skeleton"></div></div></div>
  </div>
</main>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxOpen">✏️ Open</div>
  <div class="ctx-item" id="ctxDuplicate">📋 Duplicate</div>
  <div class="ctx-item" id="ctxDelete" style="color:var(--color-danger)">🗑 Delete</div>
</div>

<script>
const API = 'http://localhost:3003/api';
let allDesigns = [];
let activeDesignId = null;

function getToken() { return localStorage.getItem('a3d_token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('a3d_user')); } catch { return null; } }

function toast(msg, type='info') {
  const icons = { success:'✓', error:'✗', info:'ℹ', warning:'⚠' };
  const c = document.getElementById('a3d-toasts');
  const t = document.createElement('div');
  t.className = `a3d-toast ${type}`;
  t.innerHTML = `<span class="a3d-toast-icon">${icons[type]||'ℹ'}</span><span>${msg}</span><button class="a3d-toast-close" onclick="this.parentElement.remove()">×</button>`;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
}

async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function renderDesigns(designs) {
  const grid = document.getElementById('designsGrid');
  if (!designs.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📐</div>
      <h3>No designs yet</h3>
      <p>Create your first floor plan to get started</p>
      <button class="btn-new" onclick="newDesign()">＋ Create your first design</button>
    </div>`;
    return;
  }
  grid.innerHTML = designs.map(d => `
    <div class="design-card" data-id="${d._id}" ondblclick="openDesign('${d._id}')">
      <div class="card-thumb">
        ${d.thumbnail ? `<img src="${d.thumbnail}" alt="${d.name}">` : '🏠'}
        <button class="card-menu-btn" onclick="openCtxMenu(event,'${d._id}')">⋯</button>
      </div>
      <div class="card-body">
        <div class="card-name">${d.name}</div>
        <div class="card-meta">
          <span>Edited ${relativeTime(d.updatedAt)}</span>
          <span class="card-floor-badge">🏢 ${d.floorCount || 1} floor</span>
        </div>
        <button class="btn-new" style="width:100%; margin-top:12px; font-size:12px; padding:6px;" onclick="openDesign('${d._id}')">✏️ Edit Design</button>
      </div>
    </div>
  `).join('');
}

function filterDesigns(query) {
  const q = query.toLowerCase();
  renderDesigns(q ? allDesigns.filter(d => d.name.toLowerCase().includes(q)) : allDesigns);
}

async function loadDesigns() {
  if (!getToken()) { window.location.href = 'login.html'; return; }
  try {
    allDesigns = await apiFetch('GET', '/designs');
    renderDesigns(allDesigns);
  } catch (e) {
    document.getElementById('designsGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load designs</h3><p>${e.message}</p></div>`;
  }
}

function openDesign(id) {
  localStorage.setItem('a3d_design_id', id);
  window.location.href = 'index.html';
}

function newDesign() {
  localStorage.removeItem('a3d_design_id');
  window.location.href = 'index.html';
}

// ── Context menu ──
let ctxDesignId = null;
function openCtxMenu(e, id) {
  e.stopPropagation();
  ctxDesignId = id;
  const menu = document.getElementById('ctxMenu');
  menu.style.left = e.pageX + 'px';
  menu.style.top = e.pageY + 'px';
  menu.classList.add('open');
}
document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('open'));
document.getElementById('ctxOpen').onclick = () => ctxDesignId && openDesign(ctxDesignId);
document.getElementById('ctxDuplicate').onclick = async () => {
  if (!ctxDesignId) return;
  try {
    const clone = await apiFetch('POST', '/designs/' + ctxDesignId + '/duplicate');
    allDesigns.unshift(clone);
    renderDesigns(allDesigns);
    toast('Design duplicated!', 'success');
  } catch(e) { toast(e.message, 'error'); }
};
document.getElementById('ctxDelete').onclick = async () => {
  if (!ctxDesignId) return;
  if (!confirm('Delete this design? This cannot be undone.')) return;
  try {
    await apiFetch('DELETE', '/designs/' + ctxDesignId);
    allDesigns = allDesigns.filter(d => d._id !== ctxDesignId);
    renderDesigns(allDesigns);
    toast('Design deleted', 'info');
  } catch(e) { toast(e.message, 'error'); }
};

function doLogout() {
  localStorage.removeItem('a3d_token');
  localStorage.removeItem('a3d_user');
  toast('You have been signed out', 'info');
  setTimeout(() => window.location.href = 'login.html', 800);
}

// ── Init ──
(function init() {
  if (!getToken()) { window.location.href = 'login.html'; return; }
  const user = getUser();
  if (user) {
    document.getElementById('sidebarAvatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('sidebarName').textContent = user.name;
    document.getElementById('sidebarEmail').textContent = user.email;
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetingText').textContent = greet + ', ' + user.name.split(' ')[0] + ' 👋';
  }
  loadDesigns();
})();
</script>
</body>
</html>
