<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · Architecture Master</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .container { max-width:480px; }
  .code { font-family:var(--font-heading); font-size:120px; font-weight:800; line-height:1;
    background:linear-gradient(135deg,#6C63FF,#00C9A7); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; background-clip:text; margin:0 0 24px; }
  h1 { font-family:var(--font-heading); font-size:28px; font-weight:700; margin:0 0 14px; }
  p  { color:var(--color-muted); font-size:16px; line-height:1.7; margin:0 0 32px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 24px;
    background:var(--color-accent); color:#fff; border-radius:12px; text-decoration:none;
    font-family:var(--font-ui); font-size:14px; font-weight:600;
    transition:background 0.2s, transform 0.2s; }
  .btn:hover { background:#5A52E0; transform:translateY(-2px); }
</style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <a href="landing.html" class="btn">← Go back home</a>
  </div>
</body>
</html>
